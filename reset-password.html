<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peaches Reset Password</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Jost', sans-serif;
    background: #FDF8F5;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
  }
  .phone-frame {
    width: min(430px, 100vw);
    min-height: 100dvh;
    background: #FDF8F5;
    overflow: hidden;
  }
  .phone-header {
    height: 114px;
    background: #D4277A;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 24px;
  }
  .brand {
    color: white;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: .08em;
  }
  .panel {
    padding: 48px 44px 36px;
    text-align: center;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-style: italic;
    font-weight: 300;
    color: #2C1A1A;
    margin-bottom: 12px;
  }
  .copy {
    font-size: 12px;
    color: #A06080;
    line-height: 1.7;
    margin-bottom: 28px;
  }
  .input-group { margin-bottom: 14px; text-align: left; }
  .input-group label {
    display: block;
    text-align: center;
    font-size: 10px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: #A06080;
    margin-bottom: 8px;
  }
  .input-group input {
    width: 100%;
    padding: 14px 16px;
    background: #FDF8F5;
    border: 1.5px solid #F0DCE8;
    border-radius: 8px;
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    color: #2C1A1A;
    outline: none;
  }
  .input-group input:focus { border-color: #D4277A; background: white; }
  .login-btn {
    display: block;
    width: 100%;
    padding: 12px;
    background: #D4277A;
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    letter-spacing: .18em;
    text-transform: uppercase;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(212,39,122,.3);
  }
  .login-btn:disabled { opacity: .65; cursor: wait; }
  .auth-status {
    min-height: 36px;
    margin-top: 16px;
    font-size: 12px;
    line-height: 1.5;
    color: #A06080;
  }
  .auth-status[data-tone="success"] { color: #4A7C59; }
  .auth-status[data-tone="error"] { color: #B54040; }
</style>
</head>
<body>
  <main class="phone-frame">
    <div class="phone-header">
      <div class="brand">PEACHES LOYALTY</div>
    </div>
    <section class="panel">
      <h1>Set a new<br>password.</h1>
      <p class="copy">Choose a new password for your Peaches account.</p>

      <form id="password-reset-form">
        <div class="input-group">
          <label for="reset-password">New password</label>
          <input id="reset-password" name="reset-password" type="password" autocomplete="new-password" required minlength="6" placeholder="New password">
        </div>
        <div class="input-group">
          <label for="reset-password-confirm">Confirm password</label>
          <input id="reset-password-confirm" name="reset-password-confirm" type="password" autocomplete="new-password" required minlength="6" placeholder="Repeat password">
        </div>
        <button class="login-btn" type="submit">Update password</button>
      </form>

      <div id="auth-status" class="auth-status" aria-live="polite"></div>
    </section>
  </main>
  <script src="/js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/peaches-data.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/auth-router.js?v=20260520-reset-mode"></script>
</body>
</html>
